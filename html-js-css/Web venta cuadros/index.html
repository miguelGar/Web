<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi arte</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header class="header">
        <div class="header_logo">
            <span class="title"> MgArt_3579</span>
        </div>

        <!-- Botón Hamburguesa  -->
        <button class="hamburger" aria-label="Toggle menu" id="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <!-- Filtros de Productos -->
        <div class="filters" id="filters-menu">
            <button class="filter_btn filter_btn--active" data-cat="all">Todos</button>
            <button class="filter_btn" data-cat="oleo">Oleo</button>
            <button class="filter_btn" data-cat="acuarela">Acuarela</button>
            <button class="filter_btn" data-cat="mix">Mix</button>
            <button class="filter_btn" data-cat="figura">Figuras</button>
        </div>
        <div class="header_actions">
            <!-- Icono Fav -->
            <button class="action_btn" id="btn-favs">
                <i class="fas fa-heart"></i>
                <span class="badge hidden" id="badge-fav">0</span>
            </button>
            <!-- Icono Carrito -->
            <button class="action_btn" id="btn-cart">
                <i class="fas fa-shopping-cart"></i>
                <span class="badge hidden" id="badge-cart">0</span>
            </button>
        </div>
    </header>

    <h1 class="filter_title">Catálogo de Arte</h1>

    <!-- ÁREA PRINCIPAL -->
    <main>
        <!-- Loader (Async demo) -->
        <div id="loader" class="catalog_art">
            <div class="loader"><i class="fas fa-spinner fa-spin"></i> Cargando productos...</div>
        </div>

        <!-- Catálogo Dinámico -->
        <div id="catalog_art" class="catalog_art hidden">

        </div>
    </main>

    <!-- CARRITO SIDEBAR -->
    <aside class="cart_modal" id="cart_modal">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Tu Pedido</h2>
            <button onclick="toggleCart()"
                style="background:none; border:none; font-size: 1.5rem; cursor:pointer;">&times;</button>
        </div>
        <div class="cart_items" id="cart-items-container">
            <p style="color: #888; text-align: center; margin-top: 50px;">El carrito está vacío</p>
        </div>
        <div class="cart_total">
            Total: <span id="cart-total-price">$0.00</span>
        </div>
        <button class="product_btn" id="btn-checkout">Finalizar Compra</button>
    </aside>

    <!-- TOAST -->
    <div id="toast" class="toast">Mensaje de notificación</div>

</body>

<div id="product_modal" class="modal hidden">
    <div class="modal_overlay" onclick="closeProductModal()"></div>
    <div class="modal_content">
        <button class="modal_close" onclick="closeProductModal()">&times;</button>
        <div id="modal_product_data"></div>
    </div>

</div>

<script src="js/catalog.js"></script>

</html>
